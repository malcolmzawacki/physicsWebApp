name: Correctness Guardrails

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate payload contract
        env:
          PYTHONPATH: .
        run: python tools/validate_payloads.py

      - name: Check prompt/answer consistency
        env:
          PYTHONPATH: .
        run: python tools/check_prompt_answer_consistency.py
